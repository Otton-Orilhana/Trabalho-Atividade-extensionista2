<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel do Professor - EduFin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">EduFin</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="lesson.html">Conteúdos</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Meu Perfil</a></li>
        </ul>
        <span id="nav-user" class="text-white ms-3"></span>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h3>Painel do Professor</h3>
    <div class="mb-3 d-flex gap-2">
      <button id="refresh-teacher" class="btn btn-primary">Atualizar tabela</button>
      <button id="export-csv" class="btn btn-outline-secondary">Exportar CSV</button>
    </div>

    <div class="table-responsive">
      <table id="teacher-table" class="table table-striped">
        <thead>
          <tr><th>Usuário</th><th>Lição</th><th>Pontuação</th><th>Data</th></tr>
        </thead>
        <tbody>
          <tr><td colspan="4">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Atualiza nav-user
    (function(){
      try {
        const navEl = document.getElementById('nav-user');
        if (!navEl) return;
        const cur = JSON.parse(localStorage.getItem('currentUser')||'null');
        if (cur && cur.name) {
          navEl.innerHTML = `Olá, ${cur.name} • <a href="#" onclick="logout()" class="text-white">Sair</a>`;
        } else {
          navEl.innerHTML = `<a href="login.html" class="text-white">Entrar</a>`;
        }
      } catch (e) { console.warn('Erro ao atualizar nav-user', e); }
    })();

    // Botões: atualizar tabela e exportar CSV
    document.addEventListener('DOMContentLoaded', () => {
      const refreshBtn = document.getElementById('refresh-teacher');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', () => {
          try {
            if (typeof renderTeacher === 'function') {
              renderTeacher();
              // feedback sem recarregar a página
              if (typeof showToast === 'function') showToast('Tabela atualizada', 'success');
            } else {
              console.warn('renderTeacher não disponível');
            }
          } catch (e) {
            console.error('Erro ao atualizar tabela', e);
          }
        });
      }

      const exportBtn = document.getElementById('export-csv');
      if (exportBtn) {
        exportBtn.addEventListener('click', () => {
          try {
            if (typeof exportResultsCSV === 'function') exportResultsCSV();
            else console.warn('exportResultsCSV não disponível');
          } catch(e){ console.error('Erro ao exportar CSV', e); }
        });
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
