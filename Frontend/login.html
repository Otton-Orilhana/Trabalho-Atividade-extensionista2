<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Entrar na plataforma EduFin — educação financeira para alunos.">
  <title>Login - EduFin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary" role="navigation" aria-label="Navegação principal">
    <div class="container">
      <a class="navbar-brand" href="index.html">EduFin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="lesson.html">Conteúdos</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Meu Perfil</a></li>
          <li class="nav-item"><a class="nav-link" href="teacher.html">Professor</a></li>
        </ul>
        <span id="nav-user" class="text-white ms-3" aria-live="polite"></span>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm">
          <h3 class="mb-3">Entrar</h3>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="login-username" class="form-label">Usuário</label>
              <input id="login-username" class="form-control" required aria-required="true" />
            </div>

            <div class="mb-3">
              <label for="login-password" class="form-label">Senha</label>
              <input id="login-password" type="password" class="form-control" required aria-required="true" />
            </div>

            <div id="login-msg" class="text-danger mb-2" aria-live="polite"></div>

            <div class="d-flex gap-2">
              <button class="btn btn-primary" type="submit">Entrar</button>
              <a class="btn btn-link" href="register.html">Criar conta</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </main>

  <noscript>
    <div class="alert alert-warning text-center m-3">Este site funciona melhor com JavaScript habilitado.</div>
  </noscript>

  <!-- scripts: auth.js primeiro (fornece logout e handlers), app.js em seguida -->
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <!-- Atualiza o nav com o usuário atual (usa logout() definido em auth.js) -->
  <script>
    (function(){
      try {
        const navEl = document.getElementById('nav-user');
        if (!navEl) return;
        const cur = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (cur && cur.name) {
          navEl.innerHTML = `Olá, ${cur.name} • <a href="#" onclick="logout()" class="text-white">Sair</a>`;
        } else {
          navEl.innerHTML = `<a href="login.html" class="text-white">Entrar</a>`;
        }
      } catch (e) {
        console.warn('Erro ao atualizar nav-user', e);
      }
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
