<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Quiz — EduFin. Faça quizzes por lição e acompanhe seu desempenho.">
  <title>Quiz - EduFin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Proteção imediata: evita qualquer submit padrão e marca a página para prevenir submit programático -->
  <script>
    // evita submit por tecla Enter ou por form.submit() programático nesta página
    window.__preventFormSubmit = true;
    // captura qualquer submit nativo e impede
    document.addEventListener('submit', function (e) {
      try { e.preventDefault(); e.stopImmediatePropagation(); } catch (err) {}
    }, true);
  </script>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary" role="navigation" aria-label="Navegação principal">
    <div class="container">
      <a class="navbar-brand" href="index.html">EduFin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="lesson.html">Conteúdos</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Meu Perfil</a></li>
          <li class="nav-item"><a class="nav-link" href="teacher.html">Professor</a></li>
        </ul>
        <span id="nav-user" class="text-white ms-3" aria-live="polite"></span>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h3 id="lesson-title">Quiz</h3>

    <!-- form permanece para acessibilidade, mas o botão é type="button" -->
    <form id="quiz-form" novalidate>
      <div id="questions" class="mb-3" aria-live="polite"></div>

      <div class="d-flex gap-2 align-items-center">
        <button id="submit-quiz" class="btn btn-success" type="button">Enviar</button>
        <a id="back-to-content" class="btn btn-link" href="lesson.html">Voltar para Conteúdos</a>
      </div>
    </form>

    <div id="result" class="mt-3" aria-live="polite"></div>
  </main>

  <noscript>
    <div class="alert alert-warning text-center m-3">Este site funciona melhor com JavaScript habilitado.</div>
  </noscript>

  <!-- scripts: auth.js primeiro, app.js em seguida -->
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <!-- atualiza o nav com o usuário atual (usa logout() definido em auth.js) -->
  <script>
    (function(){
      try {
        const navEl = document.getElementById('nav-user');
        if (!navEl) return;
        const cur = JSON.parse(localStorage.getItem('currentUser')||'null');
        if (cur && cur.name) {
          navEl.innerHTML = `Olá, ${cur.name} • <a href="#" onclick="logout()" class="text-white">Sair</a>`;
        } else {
          navEl.innerHTML = `<a href="login.html" class="text-white">Entrar</a>`;
        }
      } catch (e) {
        console.warn('Erro ao atualizar nav-user', e);
      }
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
